<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar conta — TODO Rails</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body class="auth-page">
    <div class="auth-card">
      <div class="brand">
        <p class="brand-name">TODO <span>Rails</span></p>
        <small>Crie sua conta gratuita</small>
      </div>

      <!-- Task 2: server-side error messages -->
      <!-- O backend deve passar "errorMessage" no model quando houver conflito -->
      <div
        class="alert alert-error"
        th:if="${errorMessage}"
        th:text="${errorMessage}"
      >
        Erro ao criar conta.
      </div>

      <form
        id="register-form"
        th:action="@{/register}"
        method="post"
        novalidate
      >
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />

        <div class="form-group">
          <label for="username">Usuário</label>
          <input
            id="username"
            name="username"
            type="text"
            class="form-control"
            placeholder="seu usuário"
            th:value="${username}"
            autocomplete="username"
            autofocus
          />
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            id="email"
            name="email"
            type="email"
            class="form-control"
            placeholder="voce@email.com"
            th:value="${email}"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-control"
            placeholder="mínimo 6 caracteres"
            autocomplete="new-password"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar senha</label>
          <input
            id="confirmPassword"
            name="confirmPassword"
            type="password"
            class="form-control"
            placeholder="repita a senha"
            autocomplete="new-password"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary"
          style="margin-top: 0.5rem"
        >
          Criar conta
        </button>
      </form>

      <p
        style="
          margin-top: 1.5rem;
          text-align: center;
          font-size: 0.875rem;
          color: var(--muted);
        "
      >
        Já tem conta?
        <a th:href="@{/login}">Entrar</a>
      </p>
    </div>

    <script th:src="@{/js/main.js}"></script>
  </body>
</html>
