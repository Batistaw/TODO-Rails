<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — TODO Rails</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="auth-card">
      <div class="brand">
        <p class="brand-name">TODO <span>Rails</span></p>
        <small>Entre na sua conta para continuar</small>
      </div>

      <!-- Task 2: error params from Spring Security -->
      <div class="alert alert-error" th:if="${param.error}">
        Usuário ou senha incorretos. Tente novamente.
      </div>

      <div class="alert alert-success" th:if="${param.logout}">
        Você saiu com sucesso.
      </div>

      <form id="login-form" th:action="@{/login}" method="post" novalidate>
        <!-- CSRF token (Task 1 / Spring Security) -->
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />

        <div class="form-group">
          <label for="username">Usuário</label>
          <input
            id="username"
            name="username"
            type="text"
            class="form-control"
            placeholder="seu usuário"
            autocomplete="username"
            autofocus
          />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-control"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary"
          style="margin-top: 0.5rem"
        >
          Entrar
        </button>
      </form>

      <p
        style="
          margin-top: 1.5rem;
          text-align: center;
          font-size: 0.875rem;
          color: var(--muted);
        "
      >
        Não tem conta?
        <a th:href="@{/register}">Criar conta</a>
      </p>
    </div>

    <script th:src="@{/js/main.js}"></script>
  </body>
</html>
