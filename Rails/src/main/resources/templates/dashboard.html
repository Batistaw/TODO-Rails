<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Dashboard', ~{::main-content})}"
      lang="pt-BR">
<head></head>
<body>
<th:block th:fragment="main-content">

  <!-- =====================
       DASHBOARD HEADER
       Task 7: relógio em tempo real
       ===================== -->
  <div class="dash-header">
    <div>
      <h1>Minhas Tarefas</h1>
      <p class="small" th:text="'Bem-vindo, ' + ${#authentication.name}">Bem-vindo!</p>
    </div>
    <div class="clock-block">
      <div class="time" id="live-time">00:00:00</div>
      <div class="date" id="live-date">—</div>
    </div>
  </div>

  <!-- =====================
       STATS (Task 5 / 6)
       O backend passa: totalTasks, completedTasks, pendingTasks, dueTodayTasks
       ===================== -->
  <div class="stats-grid">
    <div class="stat-card accent">
      <div class="stat-label">Total</div>
      <div class="stat-value" th:text="${totalTasks}">0</div>
    </div>
    <div class="stat-card success">
      <div class="stat-label">Concluídas</div>
      <div class="stat-value" th:text="${completedTasks}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pendentes</div>
      <div class="stat-value" th:text="${pendingTasks}">0</div>
    </div>
    <div class="stat-card warn">
      <div class="stat-label">Vencem hoje</div>
      <div class="stat-value" th:text="${dueTodayTasks}">0</div>
    </div>
  </div>

  <!-- =====================
       TASK TABLE
       Task 3 + 5 + 6
       O backend passa: tasks (List<Task>)
       Cada Task tem: id, title, priority (HIGH/MEDIUM/LOW),
                      type, dueDate, completed, dueToday
       ===================== -->
  <div class="section-header">
    <h2>Lista de Tarefas</h2>
    <a th:href="@{/tasks/new}" class="btn btn-primary" style="width:auto; padding:.55rem 1.1rem;">
      + Nova Tarefa
    </a>
  </div>

  <div class="task-table-wrap">
    <table class="task-table" th:if="${tasks != null and !tasks.empty}">
      <thead>
        <tr>
          <th>✓</th>
          <th>Título</th>
          <th>Prioridade</th>
          <th>Tipo</th>
          <th>Vencimento</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="task : ${tasks}">

          <!-- Task 6: status toggle -->
          <td>
            <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input
                type="checkbox"
                class="status-check"
                th:checked="${task.completed}"
                title="Marcar como concluída"
              />
            </form>
          </td>

          <!-- Task 3: title + done style -->
          <td>
            <span class="task-title" th:classappend="${task.completed} ? ' done'" th:text="${task.title}">
              Tarefa
            </span>
          </td>

          <!-- Task 5: priority badge -->
          <td>
            <span class="badge"
              th:classappend="${task.priority == 'HIGH'} ? 'badge-high' :
                              (${task.priority == 'MEDIUM'} ? 'badge-medium' : 'badge-low')"
              th:text="${task.priority == 'HIGH'} ? 'Alto' :
                       (${task.priority == 'MEDIUM'} ? 'Médio' : 'Baixo')">
              Médio
            </span>
          </td>

          <!-- type -->
          <td th:text="${task.type}">Pessoal</td>

          <!-- Task 5: due date highlight -->
          <td>
            <span
              th:if="${task.dueToday}"
              class="due-today"
              th:text="'Hoje'">
              ● Hoje
            </span>
            <span
              th:unless="${task.dueToday}"
              th:text="${#temporals.format(task.dueDate, 'dd/MM/yyyy')}">
              01/01/2025
            </span>
          </td>

          <!-- edit / delete -->
          <td style="white-space:nowrap; display:flex; gap:.4rem;">
            <a
              th:href="@{/tasks/{id}/edit(id=${task.id})}"
              class="btn btn-secondary btn-sm">
              Editar
            </a>
            <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-danger btn-sm btn-delete">
                Excluir
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Empty state -->
    <div class="empty-state" th:if="${tasks == null or tasks.empty}">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <p>Nenhuma tarefa ainda.</p>
      <a th:href="@{/tasks/new}" class="btn btn-primary" style="width:auto; margin-top:1rem;">
        Criar primeira tarefa
      </a>
    </div>
  </div>

</th:block>
</body>
</html>
