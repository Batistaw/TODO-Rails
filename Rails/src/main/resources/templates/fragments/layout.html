<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title} + ' - TODO Rails'">TODO Rails</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>

  <body>
    <div class="page-wrapper">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-brand"><span class="dot"></span> TODO Rails</div>
        <nav>
          <a
            th:href="@{/dashboard}"
            th:classappend="${#httpServletRequest.requestURI.contains('dashboard')} ? 'active'"
          >
            <!-- icon: home -->
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            Dashboard
          </a>
          <a
            th:href="@{/tasks/new}"
            th:classappend="${#httpServletRequest.requestURI.contains('new')} ? 'active'"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Nova Tarefa
          </a>
        </nav>
        <div class="sidebar-footer">
          <!-- logged user -->
          <small class="small" th:text="'Olá, ' + ${#authentication.name}"
            >Olá, usuário</small
          >
          <form
            th:action="@{/logout}"
            method="post"
            style="margin-top: 0.75rem"
          >
            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />
            <button
              type="submit"
              class="btn btn-secondary btn-sm"
              style="width: 100%; justify-content: center"
            >
              Sair
            </button>
          </form>
        </div>
      </aside>

      <!-- Main -->
      <main class="main-content">
        <th:block th:replace="${content}" />
      </main>
    </div>

    <!-- Mobile bottom nav -->
    <nav class="mobile-nav">
      <a
        th:href="@{/dashboard}"
        th:classappend="${#httpServletRequest.requestURI.contains('dashboard')} ? 'active'"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        </svg>
        Home
      </a>
      <a th:href="@{/tasks/new}">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Nova
      </a>
    </nav>

    <script th:src="@{/js/main.js}"></script>
  </body>
</html>
